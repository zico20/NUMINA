name: smart_calc
description: "AI-powered Scientific Calculator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Math engine + LaTeX rendering
  math_expressions: ^2.7.0
  flutter_math_fork: ^0.7.4

  # Image / camera
  image_picker: ^1.1.2     # Used for the Gallery picker only.
  camera: ^0.11.1          # Live preview for the in-app Framing screen.

  # HTTP
  http: ^1.2.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

  # i18n / formatting
  intl: any

  # Charts
  fl_chart: ^0.69.2

  # Typography (Geist, IBM Plex Sans Arabic, JetBrains Mono via Google Fonts)
  google_fonts: ^6.2.1

  # Misc
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

  # Fonts (downloaded on first build via flutter run; placeholders for now)
