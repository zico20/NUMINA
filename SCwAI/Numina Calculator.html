<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Numina · AI Scientific Calculator</title>
<style>
  html, body { margin: 0; padding: 0; background: #0a1410; font-family: -apple-system, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="calc-engine.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screen-calculator.jsx"></script>
<script type="text/babel" src="screen-camera.jsx"></script>
<script type="text/babel" src="screen-solution.jsx"></script>
<script type="text/babel" src="screen-extras.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "dark": true,
  "showAndroid": true,
  "showArabic": true,
  "accent": "emerald"
}/*EDITMODE-END*/;

// Generic device wrapper that fits each screen into iOS or Android frame
function Phone({ platform, lang, dark, screen, ...rest }) {
  const isIOS = platform === 'ios';
  const W = 360, H = 740;
  const frame = isIOS
    ? <IOSDevice width={W} height={H} dark={dark}>{screen}</IOSDevice>
    : <AndroidDevice width={W} height={H} dark={dark}>{screen}</AndroidDevice>;
  return frame;
}

// Lightweight Android wrapper since starter has its own; we'll inline a slim version
function AndroidDevice({ width=360, height=740, dark=false, children }) {
  const bg = dark ? '#06100c' : '#f4f6f3';
  return (
    <div style={{
      width, height, borderRadius: 38, overflow:'hidden', position:'relative',
      background: bg, boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      border: `8px solid ${dark ? '#0a0a0a' : '#1a1a1a'}`,
    }}>
      {/* status bar punch hole */}
      <div style={{
        position:'absolute', top: 8, left: '50%', transform:'translateX(-50%)',
        width: 18, height: 18, borderRadius: 999, background: '#000', zIndex: 100,
      }}/>
      <div style={{ height: '100%', position: 'relative' }}>{children}</div>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS);
  const dark = tweaks.dark;

  // Per-frame demo state — each phone shows a different screen for richness
  const noop = () => {};

  // Build a screen given config
  const screen = (kind, lang, platform) => {
    const p = { dark, lang, platform, onClose: noop };
    if (kind === 'calc') return <CalculatorScreen {...p} onOpenAI={noop} onOpenHistory={noop} onOpenGraph={noop} onOpenUnits={noop} onOpenSettings={noop}/>;
    if (kind === 'cam-frame') return <CameraScreen {...p}/>;
    if (kind === 'cam-extracted') return <CameraStaged {...p} stage="extracted"/>;
    if (kind === 'sol') return <SolutionScreen {...p} mode="step"/>;
    if (kind === 'graph') return <GraphScreen {...p}/>;
    if (kind === 'hist') return <HistoryScreen {...p}/>;
    if (kind === 'units') return <UnitsScreen {...p}/>;
    if (kind === 'settings') return <SettingsScreen {...p} onToggleDark={()=>setTweak('dark', !dark)}/>;
    return null;
  };

  return (
    <DesignCanvas>
      <DCSection id="hero" title="Numina · AI Scientific Calculator"
        subtitle="حاسبة علمية مدعومة بالذكاء الاصطناعي · iOS + Android · AR + EN">

        {/* HERO row: calc on both platforms in both languages */}
        <DCArtboard id="ios-en-calc" label="iOS · EN · Calculator" width={376} height={756}>
          <Phone platform="ios" lang="en" dark={dark} screen={screen('calc','en','ios')}/>
        </DCArtboard>

        <DCArtboard id="ios-ar-calc" label="iOS · AR · حاسبة" width={376} height={756}>
          <Phone platform="ios" lang="ar" dark={dark} screen={screen('calc','ar','ios')}/>
        </DCArtboard>

        <DCArtboard id="and-en-calc" label="Android · EN · Calculator" width={376} height={756}>
          <Phone platform="android" lang="en" dark={dark} screen={screen('calc','en','android')}/>
        </DCArtboard>

        <DCArtboard id="and-ar-calc" label="Android · AR · حاسبة" width={376} height={756}>
          <Phone platform="android" lang="ar" dark={dark} screen={screen('calc','ar','android')}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="ai-flow" title="AI Vision Flow · تدفق التشخيص بالذكاء"
        subtitle="Camera framing → analyzing → extracted equation → step-by-step solution">

        <DCArtboard id="cam-frame-en" label="1 · Framing (EN)" width={376} height={756}>
          <Phone platform="ios" lang="en" dark={dark} screen={<CameraScreen dark={dark} lang="en" platform="ios" onClose={noop} onExtracted={noop}/>}/>
        </DCArtboard>

        <DCArtboard id="cam-analyzing" label="2 · Analyzing" width={376} height={756}>
          <Phone platform="ios" lang="en" dark={dark} screen={<CameraStaged dark={dark} lang="en" platform="ios" stage="analyzing"/>}/>
        </DCArtboard>

        <DCArtboard id="cam-extracted" label="3 · Extracted" width={376} height={756}>
          <Phone platform="ios" lang="en" dark={dark} screen={<CameraStaged dark={dark} lang="en" platform="ios" stage="extracted"/>}/>
        </DCArtboard>

        <DCArtboard id="sol-en" label="4 · Solution (EN)" width={376} height={756}>
          <Phone platform="ios" lang="en" dark={dark} screen={<SolutionScreen dark={dark} lang="en" platform="ios" onClose={noop} onGraph={noop} mode="step"/>}/>
        </DCArtboard>

        <DCArtboard id="sol-ar" label="4 · الحل بالعربية" width={376} height={756}>
          <Phone platform="ios" lang="ar" dark={dark} screen={<SolutionScreen dark={dark} lang="ar" platform="ios" onClose={noop} onGraph={noop} mode="step"/>}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="extras" title="Extra screens · شاشات إضافية"
        subtitle="Graph · History · Unit converter · Settings — في كلا اللغتين">

        <DCArtboard id="graph-en" label="Graph · EN" width={376} height={756}>
          <Phone platform="ios" lang="en" dark={dark} screen={<GraphScreen dark={dark} lang="en" platform="ios" onClose={noop}/>}/>
        </DCArtboard>

        <DCArtboard id="hist-en" label="History · EN" width={376} height={756}>
          <Phone platform="ios" lang="en" dark={dark} screen={<HistoryScreen dark={dark} lang="en" platform="ios" onClose={noop}/>}/>
        </DCArtboard>

        <DCArtboard id="hist-ar" label="السجل · AR" width={376} height={756}>
          <Phone platform="android" lang="ar" dark={dark} screen={<HistoryScreen dark={dark} lang="ar" platform="android" onClose={noop}/>}/>
        </DCArtboard>

        <DCArtboard id="units-en" label="Units · EN" width={376} height={756}>
          <Phone platform="ios" lang="en" dark={dark} screen={<UnitsScreen dark={dark} lang="en" platform="ios" onClose={noop}/>}/>
        </DCArtboard>

        <DCArtboard id="units-ar" label="الوحدات · AR" width={376} height={756}>
          <Phone platform="android" lang="ar" dark={dark} screen={<UnitsScreen dark={dark} lang="ar" platform="android" onClose={noop}/>}/>
        </DCArtboard>

        <DCArtboard id="settings-en" label="Settings · EN" width={376} height={756}>
          <Phone platform="ios" lang="en" dark={dark} screen={<SettingsScreen dark={dark} lang="en" platform="ios" onClose={noop} onToggleDark={()=>setTweak('dark', !dark)} onToggleLang={noop}/>}/>
        </DCArtboard>

        <DCArtboard id="settings-ar" label="الإعدادات · AR" width={376} height={756}>
          <Phone platform="android" lang="ar" dark={dark} screen={<SettingsScreen dark={dark} lang="ar" platform="android" onClose={noop} onToggleDark={()=>setTweak('dark', !dark)} onToggleLang={noop}/>}/>
        </DCArtboard>
      </DCSection>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakToggle label="Dark mode" value={dark} onChange={v => setTweak('dark', v)}/>
        </TweakSection>
        <TweakSection title="About">
          <div style={{ fontSize: 12, color: '#666', lineHeight: 1.5 }}>
            Numina explores an AI-first scientific calculator with native iOS &amp; Android frames,
            full RTL Arabic support, and a step-by-step LaTeX solution engine.
          </div>
        </TweakSection>
      </TweaksPanel>
    </DesignCanvas>
  );
}

// Helper to render the camera screen at a specific stage (skip the timing animation)
function CameraStaged({ dark, lang, platform, stage }) {
  // We re-render the camera screen and immediately push it into the right stage
  // by manipulating its state via a key — simplest is to re-create the component
  // in a stage-locked variant. Easiest: clone the original by pre-setting a prop.
  return <CameraScreenStageProxy dark={dark} lang={lang} platform={platform} initialStage={stage}/>;
}

function CameraScreenStageProxy({ dark, lang, platform, initialStage }) {
  // Mirror the CameraScreen but force a stage. Since we can't easily preset its
  // useState from outside, render a fresh CameraScreen and immediately advance.
  const ref = React.useRef();
  // Render full camera; on mount, click capture if needed via a mutation observer
  // Simpler approach: render a copy of CameraScreen with `initialStage` honoured.
  // Use the existing component & override via a small wrapper that passes through.
  const InitStage = React.useMemo(() => {
    // create a wrapped version that starts at given stage
    return function S() {
      const [stage, setStage] = React.useState(initialStage);
      // Re-use the markup of CameraScreen by rendering it but we can't pass stage in.
      // So we inline a simplified copy that delegates to CameraScreen
      // Quick path: render CameraScreen and on first paint synthesize the same stage
      // by clicking capture. For cleanliness we inline a small staged renderer.
      return <CameraScreenInline dark={dark} lang={lang} platform={platform} stage={stage}/>;
    };
  }, [dark, lang, platform, initialStage]);
  return <InitStage/>;
}

// A duplicated CameraScreen but with stage as a prop (no internal timing).
function CameraScreenInline({ dark, lang, platform, stage }) {
  const t = window.theme(dark);
  const isAr = lang === 'ar';
  const fontUI = isAr ? NUMINA.font.uiAr : NUMINA.font.ui;
  const L = isAr ? {
    title: 'الكاميرا الذكية',
    analyzing: 'جاري التحليل…',
    analyzeSub: 'النموذج يقرأ المعادلة بصيغة LaTeX',
    extracted: 'المعادلة المستخرجة', edit: 'تعديل',
    quickSolve: 'حل سريع', stepSolve: 'حل تفصيلي',
  } : {
    title: 'AI Vision', analyzing: 'Analyzing…',
    analyzeSub: 'Reading the equation as LaTeX',
    extracted: 'Extracted equation', edit: 'Edit',
    quickSolve: 'Quick solve', stepSolve: 'Step-by-step',
  };

  return (
    <div style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden',
      background:'#000', color:'#fff', fontFamily: fontUI, direction: isAr?'rtl':'ltr' }}>
      {/* paper bg */}
      <div style={{ position:'absolute', inset:0,
        background:'linear-gradient(180deg, #1a2820 0%, #0c1a14 100%)' }}>
        <div style={{
          position:'absolute', top:'20%', left:'10%', right:'10%', bottom:'30%',
          borderRadius:8, transform:'rotate(-1.5deg)', background:'#f4ecd8',
          boxShadow:'0 30px 60px rgba(0,0,0,0.5), inset 0 0 60px rgba(120,90,40,0.15)',
          backgroundImage:`repeating-linear-gradient(0deg, transparent 0, transparent 28px, rgba(80,120,140,0.18) 28px, rgba(80,120,140,0.18) 29px)`,
        }}>
          <div style={{ position:'absolute', inset:'20% 8% 20% 8%', color:'#1a2030',
            fontSize:32, lineHeight:1.6 }}>
            <div style={{ fontFamily: NUMINA.font.math, fontStyle:'italic', fontSize:28 }}>
              ∫(2x² + 3x − 5) dx
            </div>
            <div style={{ marginTop:14, opacity:0.7, fontSize:22, fontFamily: NUMINA.font.math, fontStyle:'italic' }}>= ?</div>
          </div>
        </div>
      </div>
      <div style={{ position:'absolute', inset:0,
        background:'radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%)' }}/>

      {/* top bar */}
      <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:5,
        padding: platform==='ios'?'54px 16px 0':'46px 16px 0',
        display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ width:40, height:40, borderRadius:999, background:'rgba(0,0,0,0.5)', backdropFilter:'blur(20px)',
          display:'grid', placeItems:'center' }}>
          <Icon name="close" size={20} color="#fff"/>
        </div>
        <div style={{ padding:'8px 14px', borderRadius:999, background:'rgba(0,0,0,0.5)', backdropFilter:'blur(20px)',
          fontSize:12, fontWeight:600, letterSpacing:0.4, display:'flex', alignItems:'center', gap:6 }}>
          <Icon name="sparkle" size={14} color={t.accent}/>{L.title}
        </div>
        <div style={{ width:40, height:40, borderRadius:999, background:'rgba(0,0,0,0.5)', backdropFilter:'blur(20px)',
          display:'grid', placeItems:'center' }}>
          <Icon name="flash" size={20} color="#fff"/>
        </div>
      </div>

      {stage === 'analyzing' && (
        <>
          <div style={{ position:'absolute', inset:0, pointerEvents:'none' }}>
            <div style={{ position:'absolute', left:0, right:0, top:'40%', height:60,
              background:`linear-gradient(180deg, transparent, ${t.accent}40, transparent)`,
              boxShadow:`0 0 40px ${t.accent}` }}/>
          </div>
          <div style={{ position:'absolute', top:'50%', left:0, right:0, transform:'translateY(-50%)',
            textAlign:'center', zIndex:4 }}>
            <div style={{ margin:'0 auto', width:80, height:80, borderRadius:999,
              background:`radial-gradient(circle, ${t.accent}40 0%, transparent 70%)`,
              display:'grid', placeItems:'center', position:'relative' }}>
              <div style={{ position:'absolute', inset:0, borderRadius:999,
                border:`2px solid ${t.accent}`, borderTopColor:'transparent',
                animation:'spin 1s linear infinite' }}/>
              <Icon name="sparkle" size={32} color={t.accent}/>
            </div>
            <div style={{ marginTop:24, fontSize:18, fontWeight:600 }}>{L.analyzing}</div>
            <div style={{ fontSize:12, color:'rgba(255,255,255,0.6)', marginTop:4 }}>{L.analyzeSub}</div>
            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
          </div>
        </>
      )}

      {stage === 'extracted' && (
        <div style={{ position:'absolute', left:16, right:16, bottom: platform==='ios'?40:32, zIndex:6,
          background:'rgba(15,32,26,0.92)', backdropFilter:'blur(30px)',
          border:`1px solid ${t.borderStr}`, borderRadius:24, padding:20 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
            <div style={{ width:24, height:24, borderRadius:8, background: t.accentSoft,
              display:'grid', placeItems:'center'}}>
              <Icon name="check" size={14} color={t.accent}/>
            </div>
            <span style={{ fontSize:13, fontWeight:600, color: t.accent }}>{L.extracted}</span>
            <div style={{ flex:1 }}/>
            <div style={{ padding:'4px 10px', borderRadius:999, border:`1px solid ${t.border}`,
              color: t.textDim, fontSize:11 }}>{L.edit}</div>
          </div>
          <div style={{ background:'rgba(0,0,0,0.3)', borderRadius:14, padding:'20px 16px',
            fontFamily: NUMINA.font.math, fontSize:22, color:'#fff', textAlign:'center', direction:'ltr' }}>
            <Tex>{`\\int (2x^{2} + 3x - 5)\\, dx`}</Tex>
          </div>
          <div style={{ display:'flex', gap:8, marginTop:12 }}>
            <div style={{ flex:1, height:50, borderRadius:14, border:`1px solid ${t.border}`,
              background: t.surface2, color: t.text, fontSize:13, fontWeight:600,
              display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
              <Icon name="bolt" size={16} color={t.accent}/>{L.quickSolve}
            </div>
            <div style={{ flex:1, height:50, borderRadius:14,
              background:`linear-gradient(135deg, ${t.accent}, ${dark?'#1ec98a':'#0d8a5a'})`,
              color: dark?'#03130c':'#fff', fontSize:13, fontWeight:700,
              display:'flex', alignItems:'center', justifyContent:'center', gap:6,
              boxShadow:`0 8px 24px ${dark?'rgba(63,224,154,0.3)':'rgba(10,164,106,0.3)'}` }}>
              <Icon name="book" size={16} color={dark?'#03130c':'#fff'}/>{L.stepSolve}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
